    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #1f2937;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Header block */
        .header {
            background-color: #0078D4;
            background: linear-gradient(135deg, #005a9e, #0078d4);
            color: #ffffff;
            padding: 35px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 90, 158, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-title-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .header .header-body {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.85);
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 14px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-body p {
            margin: 0;
        }

        /* Control Bar Styles */
        .control-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background-color: #ffffff;
            padding: 20px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #0078D4;
            color: #ffffff;
        }
        .btn-primary:hover {
            background-color: #005a9e;
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #1f2937;
            border: 1px solid #e5e7eb;
        }
        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .btn-info {
            background-color: #eff6ff;
            color: #0078D4;
            border: 1px solid #bfdbfe;
        }
        .btn-info:hover {
            background-color: #dbeafe;
        }

        /* Toast Notifications */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #1f2937;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 20px;
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            right: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }

        .toast.error {
            background-color: #ef4444;
        }

        /* Summary Cards Layout */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-body {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            color: #0078D4;
            line-height: 1.2;
        }

        .card-footer {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Section Layouts */
        .section {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
            margin-bottom: 35px;
        }

        .section h2 {
            font-family: 'Outfit', sans-serif;
            color: #1f2937;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 15px 0;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #4b5563;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        th:first-child {
            border-top-left-radius: 8px;
        }
        th:last-child {
            border-top-right-radius: 8px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f9fafb;
        }

        .total-row {
            font-weight: 700;
            background-color: #f8fafc;
        }

        .total-row td {
            border-top: 2px solid #0078D4;
            border-bottom: 2px solid #0078D4;
            color: #0078D4;
            background-color: #eff6ff !important;
        }

        /* Graphical visualizers */
        .visualize {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 25px;
        }

        .chart {
            flex: 1 1 320px;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .chart-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .chart-body {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .bar-chart {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .bar {
            height: 100%;
            background-color: #0078D4;
            background: linear-gradient(135deg, #005a9e, #0078d4);
            border-radius: 4px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Service breakdown subgrids */
        .service-breakdown-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }

        .sub-breakdown-card {
            flex: 1 1 500px;
            background-color: #f8fafc;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .sub-breakdown-card h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            color: #0078D4;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .sub-breakdown-content {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }

        .sub-breakdown-chart-column {
            flex: 0 0 160px;
            width: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sub-breakdown-list-column {
            flex: 1 1 auto;
            min-width: 200px;
        }

        .breakdown-row {
            margin-bottom: 12px;
        }

        .breakdown-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .breakdown-label {
            font-weight: 500;
            color: #1f2937;
        }

        .breakdown-value {
            font-weight: 600;
            color: #4b5563;
        }

        .progress-container {
            height: 6px;
            background-color: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 3px;
        }

        /* Color rotations for service types */
        .bg-color-0 { background-color: #3b82f6; }
        .bg-color-1 { background-color: #8b5cf6; }
        .bg-color-2 { background-color: #ec4899; }
        .bg-color-3 { background-color: #f59e0b; }
        .bg-color-4 { background-color: #10b981; }
        .bg-color-5 { background-color: #6b7280; }

        /* Footer block */
        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 13px;
            text-align: center;
            font-weight: 400;
        }

        .footer p {
            margin: 4px 0;
        }

        @media (max-width: 1024px) {
            .summary-cards {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 15px auto;
                padding: 0 10px;
            }

            .header {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .section {
                padding: 20px;
            }
        }

        /* PDF/Print Adjustments */
        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm 15mm 15mm 15mm;
            }
            body {
                background-color: #ffffff !important;
                color: #000000 !important;
            }
            .container {
                margin: 0 !important;
                padding: 0 !important;
                max-width: 100% !important;
                width: 100% !important;
            }
            .control-bar {
                display: none !important;
            }
            .section {
                box-shadow: none !important;
                border: 1px solid #e5e7eb !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
                padding: 20px !important;
                margin-bottom: 25px !important;
            }
            .summary-cards, .visualize, .service-breakdown-container {
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .card, .chart {
                display: block !important;
                width: auto !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
                margin-bottom: 25px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }
            .sub-breakdown-card {
                display: block !important;
                width: auto !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
                margin-bottom: 20px !important;
                padding: 15px 20px !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                flex: none !important;
            }
            .sub-breakdown-content {
                display: flex !important;
                flex-wrap: nowrap !important;
                flex-direction: row !important;
                gap: 24px !important;
            }
            .sub-breakdown-chart-column {
                flex: 0 0 180px !important;
                max-width: 180px !important;
                margin: 0 !important;
            }
            .sub-breakdown-list-column {
                flex: 1 1 auto !important;
            }
            .breakdown-row {
                margin-bottom: 10px !important;
            }
            .progress-container {
                height: 5px !important;
            }
        }
    </style>
